name: Run checks
on:
  pull_request:
  push:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout repo
        uses: actions/checkout@v7
      - name: install nix
        uses: DeterminateSystems/nix-installer-action@v22
      - name: setup nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
      - name: run build checks
        run: nix flake check
